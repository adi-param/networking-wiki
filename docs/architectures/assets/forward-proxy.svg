<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Forward proxy traffic flow</title>
  <desc id="desc">A client sends outbound traffic to a forward proxy, and the proxy sends the request to an internet service.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5f8b"/>
    </marker>
    <style>
      .bg { fill: #f6f5f1; }
      .panel { fill: #ffffff; stroke: #d8d1c5; stroke-width: 2; }
      .zone { fill: #eeebe4; stroke: #d8d1c5; stroke-width: 2; stroke-dasharray: 10 8; }
      .title { fill: #171614; font: 700 30px Inter, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #171614; font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #65615b; font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .note { fill: #0f766e; font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; }
      .line { fill: none; stroke: #1f5f8b; stroke-width: 5; marker-end: url(#arrow); }
      .device { fill: #ffffff; stroke: #171614; stroke-width: 3; }
      .proxy { fill: #e7f5f2; stroke: #0f766e; stroke-width: 4; }
      .internet { fill: #eef4ff; stroke: #1f5f8b; stroke-width: 4; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="520"/>
  <rect class="panel" x="36" y="36" width="1128" height="448" rx="18"/>

  <text class="title" x="76" y="90">Forward proxy</text>
  <text class="small" x="76" y="122">The proxy represents the client side of the connection.</text>

  <rect class="zone" x="74" y="166" width="285" height="250" rx="16"/>
  <text class="note" x="112" y="205">Private network</text>
  <rect class="device" x="134" y="250" width="164" height="92" rx="14"/>
  <text class="label" x="177" y="294">Client</text>
  <text class="small" x="155" y="322">Laptop / app</text>

  <rect class="proxy" x="490" y="238" width="220" height="118" rx="18"/>
  <text class="label" x="518" y="288">Forward</text>
  <text class="label" x="542" y="318">Proxy</text>

  <rect class="internet" x="848" y="238" width="220" height="118" rx="18"/>
  <text class="label" x="894" y="288">Internet</text>
  <text class="small" x="900" y="318">Website / API</text>

  <path class="line" d="M 302 297 L 474 297"/>
  <path class="line" d="M 714 297 L 832 297"/>

  <text class="small" x="374" y="274">Outbound request</text>
  <text class="small" x="752" y="274">Proxy makes request</text>

  <text class="note" x="455" y="414">Destination sees the proxy as the requester</text>
</svg>
