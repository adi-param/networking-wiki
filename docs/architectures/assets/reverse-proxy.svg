<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Reverse proxy traffic flow</title>
  <desc id="desc">A client sends inbound traffic to a reverse proxy, and the proxy routes the request to backend services.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1f5f8b"/>
    </marker>
    <style>
      .bg { fill: #f6f5f1; }
      .panel { fill: #ffffff; stroke: #d8d1c5; stroke-width: 2; }
      .zone { fill: #eeebe4; stroke: #d8d1c5; stroke-width: 2; stroke-dasharray: 10 8; }
      .title { fill: #171614; font: 700 30px Inter, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #171614; font: 700 24px Inter, ui-sans-serif, system-ui, sans-serif; }
      .small { fill: #65615b; font: 500 18px Inter, ui-sans-serif, system-ui, sans-serif; }
      .note { fill: #0f766e; font: 700 17px Inter, ui-sans-serif, system-ui, sans-serif; }
      .line { fill: none; stroke: #1f5f8b; stroke-width: 5; marker-end: url(#arrow); }
      .device { fill: #ffffff; stroke: #171614; stroke-width: 3; }
      .proxy { fill: #e7f5f2; stroke: #0f766e; stroke-width: 4; }
      .backend { fill: #eef4ff; stroke: #1f5f8b; stroke-width: 3; }
    </style>
  </defs>

  <rect class="bg" width="1200" height="520"/>
  <rect class="panel" x="36" y="36" width="1128" height="448" rx="18"/>

  <text class="title" x="76" y="90">Reverse proxy</text>
  <text class="small" x="76" y="122">The proxy represents the server side of the connection.</text>

  <rect class="device" x="104" y="250" width="164" height="92" rx="14"/>
  <text class="label" x="149" y="294">Client</text>
  <text class="small" x="132" y="322">Browser / app</text>

  <rect class="proxy" x="430" y="238" width="220" height="118" rx="18"/>
  <text class="label" x="466" y="288">Reverse</text>
  <text class="label" x="482" y="318">Proxy</text>

  <rect class="zone" x="766" y="162" width="318" height="260" rx="16"/>
  <text class="note" x="804" y="200">Private backend</text>
  <rect class="backend" x="826" y="230" width="198" height="58" rx="12"/>
  <text class="small" x="875" y="266">API service</text>
  <rect class="backend" x="826" y="306" width="198" height="58" rx="12"/>
  <text class="small" x="875" y="342">Web service</text>

  <path class="line" d="M 272 297 L 414 297"/>
  <path class="line" d="M 654 276 C 704 248 746 256 810 259"/>
  <path class="line" d="M 654 318 C 704 346 746 338 810 335"/>

  <text class="small" x="310" y="274">Inbound request</text>
  <text class="small" x="670" y="230">Routes by host, path, policy</text>

  <text class="note" x="405" y="414">Client sees the proxy as the service endpoint</text>
</svg>
